<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | NearNest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .text-primary { color: #006B3E; }
        .bg-primary { background-color: #006B3E; }
        .bg-mint { background-color: #E8F5EE; }
        .text-dark-text { color: #1A1A1A; }
        .text-grey-text { color: #888888; }
    </style>
</head>
<body class="bg-mint font-sans antialiased">
    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="text-center max-w-md">
            <!-- Large 404 number -->
            <div class="text-8xl md:text-9xl font-extrabold text-primary mb-4">404</div>
            
            <!-- Icon -->
            <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center mx-auto mb-6 shadow-md">
                <i class="fas fa-map-marked-alt text-primary text-3xl"></i>
            </div>
            
            <!-- Message -->
            <h1 class="text-2xl md:text-3xl font-bold text-dark-text mb-3">Page Not Found</h1>
            <p class="text-grey-text mb-6">
                Oops! The page you're looking for doesn't exist or has been moved.
            </p>
            
            <!-- Home button -->
            <a href="index.html" class="inline-flex items-center gap-2 bg-primary text-white px-6 py-3 rounded-full font-semibold hover:bg-mid-green transition shadow-md">
                <i class="fas fa-home"></i>
                <span>Back to Home</span>
            </a>
            
            <!-- Optional subtle note -->
            <p class="text-xs text-grey-text mt-8">
                NearNest – Your perfect student home is just a click away
            </p>
        </div>
    </div>
</body>

</html>
